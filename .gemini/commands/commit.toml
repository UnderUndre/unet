- **Never amend** — always new commits
- **Never force-push** — ask user first
- **One concern per commit** — don't batch unrelated changes
- **Imperative mood**: "add", "fix", "remove" — not "added", "fixes"
- **No period** at end of subject
- **Lowercase** subject start
- If pre-commit hook fails → fix the issue → **new commit** (not --amend)

