### 🛡️ Экранирование и Кавычки
- **Backtick (`` ` ``)**: В PowerShell это символ экранирования. Используй его перед `"` внутри двойных кавычек.
- **Одинарные кавычки (`'`)**: Лучший друг. Внутри них PowerShell не пытается раскрывать переменные (`$var`).
- **Двойные кавычки (`"`)**: Используй только если нужно подставить переменную в строку перед выполнением.

