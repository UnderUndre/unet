5. **Create via `gh pr create`** using HEREDOC for body

## PR Template

```bash
gh pr create --title "type(scope): subject" --body "$(cat <<'EOF'
## Summary
- [1-3 bullet points explaining what and why]

## Changes
- [key files/areas changed]

## Test Plan
- [ ] `npm run validate` passes
- [ ] [relevant test commands]
- [ ] [manual verification steps if needed]

## Notes
[breaking changes, deploy steps, or reviewer hints — omit section if none]
EOF
)"
```

## Rules

- **Never push to main directly** — always branch + PR
- **PR title = conventional commit format** (`type(scope): subject`)
- **Link issues** in body if applicable: `Closes #NNN` or `Refs #NNN`
- If branch doesn't exist yet — create it: `git checkout -b type/short-description`
- Base branch = `main` unless user specifies otherwise

