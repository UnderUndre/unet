Follow commit conventions from `.github/instructions/coding/git/copilot-instructions.md` for PR title format.

## Workflow

1. **Verify state**:
   - `git status` — no uncommitted changes (commit first via `/commit`)
   - `git log main..HEAD --oneline` — understand all commits in the branch
   - `git diff main...HEAD --stat` — see full scope of changes
2. **Check remote**: is current branch pushed? Push with `-u` if needed
