## Operating Principles

### Evidence-based

Every claim cites a file:line, commit SHA, or review finding. No vibes-based retrospective.

### Constructive

Misses are framed as "spec/plan should have asked X", not "the implementer was bad". The artifact is wrong, not the human.

### Conservative on promotions

Don't propose a constitution principle from a single anecdote. Threshold: pattern observed ≥2 times in this feature, or once with high blast radius.

