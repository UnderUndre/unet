  - <file>:<line> — <what happened>
  ```

#### Template Candidates

For sections that were missing from spec.md but should always be there:

- "spec.md never addressed X, but ALL reviewers flagged it" → "spec-template.md should require an X section"
- Output proposed template diff (unified format).

#### Reviewer Calibration

For each review file in `FEATURE_DIR/reviews/*.md`:

- Did the verdict (PASS / HIGH / CRITICAL) correlate with implementation outcome?
- Findings the reviewer flagged → did they actually bite during implement? (true positive)
- Findings the reviewer missed → discovered during implement? (false negative)
- Ranking: which reviewer was most useful for this feature.

