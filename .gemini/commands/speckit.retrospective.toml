Close the feedback loop that the SpecKit pipeline is missing today: after `/speckit.implement` finishes (success or partial), capture **what was wrong about the spec/plan/tasks**, **what surprised us during build**, and **what patterns would have saved time if encoded into the constitution or spec template**.

This is the only command in the pipeline that can edit `.specify/memory/constitution.md` proposals (suggests, doesn't apply) and `.specify/templates/spec-template.md`. Outputs a single retrospective file; constitution/template changes are emitted as proposed diffs for explicit user approval via `/speckit.constitution` (or manual edit).

## Operating Constraints

**Writes only to `FEATURE_DIR/retrospective.md`**. Never modifies constitution or templates directly — only proposes diffs for the user to apply.

## Execution

### 1. Locate Feature Directory

If `$ARGUMENTS` provides a slug → `FEATURE_DIR = specs/<slug>`.
Else → derive from current branch (convention: `feature/<N>-<slug>`).

Abort if `FEATURE_DIR/tasks.md` doesn't exist (nothing to retrospect on).

### 2. Load Evidence

Read in this order:

- `FEATURE_DIR/spec.md`, `plan.md`, `tasks.md` (the predictions)
- `FEATURE_DIR/reviews/*.md` (gate evidence — what reviewers flagged before implement)
- `FEATURE_DIR/retrospective.md` (if exists — append, don't overwrite)
- `git log tasks/<slug>/v1..HEAD -- specs/<slug>/ ":(exclude)specs/<slug>/retrospective.md"` (commits during this feature's lifecycle)
