## Behavior

Pure status check. No edits, no fixes, no side effects on source code. Just runs the project's standard quality gates and prints one table:

```
| Check        | Command                | Status   | Duration |
|--------------|------------------------|----------|----------|
| Type-check   | npm run validate       | ✓ pass   | 1.4s     |
| Unit tests   | npm run test:unit      | ✓ pass   | 0.8s     |
| Integration  | npm run test:integration | ✗ fail (2 failed) | 11.2s |
| Build        | npm run build          | ✓ pass   | 2.1s     |
| Lint         | npm run lint           | ✓ pass   | 0.3s     |
| Drift check  | clai-helpers status --strict OR helpers regen + git diff | — n/a  | — |

Overall: ✗ failed (integration tests) — run `/fix-tests` to address.
