## Rules

1. **Detect scripts from `package.json`** in the current project. Only run what exists:
   - `validate` → type-check (typically `tsc --noEmit`)
   - `test` / `test:unit` / `test:integration` / `test:e2e` → test suites
   - `build` → build step
   - `lint` / `format:check` → lint + formatting
2. **Run them in the order listed above** (cheap checks first, so you see the first failure quickly).
3. **Capture stdout + stderr**, but only show the error summary in the status matrix. Full output is available on request ("show me the failure output").
4. **Detect context**:
   - If repo has `helpers.config.ts` (upstream template) → run `helpers regen` then `git diff --exit-code` as drift check.
   - If repo has `helpers-lock.json` (consumer) → run `clai-helpers status --strict`.
   - Otherwise skip drift row.
5. **Never edit files.** If a check fails, just report. Suggest the right fix command (`/fix-tests`, `/fix-types`, `/fix-ci`).
6. **Exit non-zero** overall if any required check failed (for CI-style use: `/verify && …`).
7. **Parallelize** where safe (unit + lint are fully independent). Keep the matrix in stable order regardless of finish order.

## Pairs with

- `/fix-tests` — if tests row is `✗`
- `/fix-types` — if type-check row is `✗`
- `/fix-ci` — if you have a CI log failure to diagnose
- `/regen` — if drift check shows non-empty diff in upstream repo

## Examples

```
